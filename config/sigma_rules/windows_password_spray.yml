title: Windows Password Spray Saldırısı
id: windows_password_spray
status: stable
description: >
  Tek IP'den kısa sürede çok sayıda FARKLI kullanıcı için başarısız giriş.
  Brute force'tan farkı: her kullanıcıya 1-2 deneme yapılır, hesap kilitleme tetiklenmez.
  MITRE ATT&CK T1110.003 — Password Spraying.
logsource:
    category: authentication
    product: windows
    service: security
detection:
    selection:
        event_type: windows_logon_failure
    condition: selection | count(distinct username) by src_ip > 5
    timeframe: 5m
level: high
tags:
    - attack.credential_access
    - attack.t1110.003
falsepositives:
    - Otomatik test sistemleri
    - LDAP keşif araçları (yetkili)
