title: Port Tarama Girişimi
id: port_scan_detected
status: stable
description: Aynı IP'den 60 saniye içinde 3+ port tarama olayı
logsource:
    category: network
    product: netguard
detection:
    selection:
        event_type: port_scan_attempt
    condition: selection | count() by src_ip > 3
    timeframe: 1m
level: medium
tags:
    - attack.discovery
    - attack.t1046
falsepositives:
    - Güvenlik tarama araçları (yetkili)
    - Ağ envanter sistemleri
