title: Port Tarama Girişimi
id: port_scan
status: stable
description: Aynı IP'den 120 saniye içinde 1+ port tarama olayı
logsource:
    category: network
    product: netguard
detection:
    selection:
        event_type: port_scan_attempt
    condition: selection | count() by src_ip > 0
    timeframe: 2m
level: medium
tags:
    - attack.discovery
    - attack.t1046
falsepositives:
    - Güvenlik tarama araçları (yetkili)
    - Ağ envanter sistemleri
